<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Escáner automático</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- ZXing -->
    <script src="https://unpkg.com/@zxing/library@latest"></script>
</head>

<body class="bg-light">

    <div class="container py-4">
        <h3 class="text-center mb-4">Escáner de Código de Barras</h3>

        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <video id="video" class="w-100 border rounded" style="height: 200px; object-fit: cover;"></video>
            </div>
        </div>

        <div class="card shadow mt-4">
            <div class="card-header bg-primary text-white">
                Códigos escaneados
            </div>
            <div class="row g-3 align-items-center text-center">
                <div class="col-sm-4">
                    <div class="col-auto">
                        <label for="skurl" class="col-form-label"><strong>SKU</strong></label>
                    </div>
                    <div class="col-auto">
                        <label class="col-form-label" id="skurl">
                        
                        </label>
                    </div>
                </div>
                <div class="col-sm-4">
                    <div class="col-auto">
                        <label for="paisurl" class="col-form-label"><strong>Pais</strong></label>
                    </div>
                    <div class="col-auto">
                        <label class="col-form-label" id="paisurl">
                        
                        </label>
                    </div>
                </div>
                <div class="col-sm-4">
                    <div class="col-auto">
                        <label for="paisurl" class="col-form-label"><strong>Accion</strong></label>
                    </div>
                    <div class="col-auto">
                        <button type="button" class="btn btn-primary" onclick="validaCodigos()">Validar y Consolidar</button>
                    </div>
                </div>
            </div>
            <div class="table-responsive">
                <table class="table table-striped mb-0">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Código</th>
                            <th>Hora</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody id="tablaBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 🔊 Sonido -->
    <audio id="beep" src="./Sonido.wav" preload="auto"></audio>

    <script>
        const codeReader = new ZXing.BrowserMultiFormatReader();
        const video = document.getElementById('video');
        const tablaBody = document.getElementById('tablaBody');
        const beep = document.getElementById('beep');

        // 👇 OBJETO PRINCIPAL (array de registros)
        let scannedData = [];
        let destinoScanner  = [];
        let scannedCodes = new Set();
        let contador = 1;

        // Obtenemos los parámetros de la URL
        const urlParams = new URLSearchParams(window.location.search);

        // Obtenemos el valor del parámetro "system"
        var sku = urlParams.get('sku');
        var pais = urlParams.get('pais');
        var urlObjeto = urlParams.get('objeto');
        //console.log(sku);
        //console.log(pais);
        document.getElementById("skurl").textContent = urlParams.get('sku') || '';
        document.getElementById("paisurl").textContent = urlParams.get('pais') || '';
        //var dataObjeto = urlParams.get('objeto');
        //console.log(sku);
        //console.log(pais);
        //console.log(dataObjeto);
        //var objeto = JSON.parse(dataObjeto);

        // 🟢 Eliminar función

        function validaCodigos(){
            //alert(urlObjeto);
            if(destinoScanner.length != 0){
                //let texto = JSON.stringify(destinoScanner);
                window.location.href = urlObjeto + `?sku=${sku}&pais=${pais}&objeto=${destinoScanner.toString()}`;
            } else{
                alert("No se encontraron cajas escaneadas");
            }
        }

        function eliminarRegistro(id, codigo) {
            // eliminar del array
            scannedData = scannedData.filter(item => item.id !== id);

            // eliminar del set (para permitir escanear otra vez)
            scannedCodes.delete(codigo);

            // Quitar del arreglo
            destinoScanner = destinoScanner.filter(x => x !== codigo);

            // eliminar del DOM
            document.getElementById(`row-${id}`).remove();

            //console.log(destinoScanner)
        }

        // 🚀 Iniciar cámara
        window.addEventListener('load', () => {
            codeReader.decodeFromVideoDevice(null, video, (result, err) => {
                if (result) {
                    let codigo = result.text;

                    if (!scannedCodes.has(codigo)) {
                        
                        if (!destinoScanner.includes(codigo)) {
                            scannedCodes.add(codigo);

                            // 🔊 sonido
                            beep.currentTime = 0;
                            beep.play().catch(() => { });

                            let hora = new Date().toLocaleTimeString();
                            let id = Date.now(); // id único

                            // 🧠 guardar en objeto
                            let registro = {
                                id,
                                codigo,
                                hora
                            };

                            scannedData.push(registro);
                            destinoScanner.push(codigo);

                            // 🧾 crear fila
                            let fila = document.createElement('tr');
                            fila.id = `row-${id}`;

                            fila.innerHTML = `
                                <td>${contador++}</td>
                                <td>${codigo}</td>
                                <td>${hora}</td>
                                <td>
                                    <button class="btn btn-danger btn-sm" onclick="eliminarRegistro(${id}, '${codigo}')">
                                        Eliminar
                                    </button>
                                </td>
                            `;

                            tablaBody.appendChild(fila);

                            setTimeout(() => {
                                scannedCodes.delete(codigo);
                            }, 2000);
                        }

                    }
                }
            });
        });
    </script>

</body>

</html>
