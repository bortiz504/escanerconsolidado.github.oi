<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Escáner automático</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- ZXing -->
    <script src="https://unpkg.com/@zxing/library@latest"></script>
</head>
<body class="bg-light">

<div class="container py-4">
    <h3 class="text-center mb-4">Escáner de Código de Barras</h3>

    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
            <video id="video" class="w-100 border rounded"></video>
        </div>
    </div>

    <div class="card shadow mt-4">
        <div class="card-header bg-primary text-white">
            Códigos escaneados
        </div>

        <div class="table-responsive">
            <table class="table table-striped mb-0">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Código</th>
                        <th>Hora</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="tablaBody"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- 🔊 Sonido -->
<audio id="beep" src="./Sonido.wav" preload="auto"></audio>

<script>
const codeReader = new ZXing.BrowserMultiFormatReader();
const video = document.getElementById('video');
const tablaBody = document.getElementById('tablaBody');
const beep = document.getElementById('beep');

// 👇 OBJETO PRINCIPAL (array de registros)
let scannedData = [];
let scannedCodes = new Set();
let contador = 1;

// 🟢 Eliminar función
function eliminarRegistro(id, codigo) {
    // eliminar del array
    scannedData = scannedData.filter(item => item.id !== id);

    // eliminar del set (para permitir escanear otra vez)
    scannedCodes.delete(codigo);

    // eliminar del DOM
    document.getElementById(`row-${id}`).remove();
}

// 🚀 Iniciar cámara
window.addEventListener('load', () => {
    codeReader.decodeFromVideoDevice(null, video, (result, err) => {
        if (result) {
            let codigo = result.text;

            if (!scannedCodes.has(codigo)) {
                scannedCodes.add(codigo);

                // 🔊 sonido
                beep.currentTime = 0;
                beep.play().catch(() => {});

                let hora = new Date().toLocaleTimeString();
                let id = Date.now(); // id único

                // 🧠 guardar en objeto
                let registro = {
                    id,
                    codigo,
                    hora
                };

                scannedData.push(registro);

                // 🧾 crear fila
                let fila = document.createElement('tr');
                fila.id = `row-${id}`;

                fila.innerHTML = `
                    <td>${contador++}</td>
                    <td>${codigo}</td>
                    <td>${hora}</td>
                    <td>
                        <button class="btn btn-danger btn-sm" onclick="eliminarRegistro(${id}, '${codigo}')">
                            Eliminar
                        </button>
                    </td>
                `;

                tablaBody.appendChild(fila);

                setTimeout(() => {
                    scannedCodes.delete(codigo);
                }, 2000);
            }
        }
    });
});
</script>

</body>
</html>
